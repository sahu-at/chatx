<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>ChatX</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="/css/style.css">

<style>

body{
margin:0;
font-family:Arial;
background:#111b21;
}

.app{
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:30%;
background:#202c33;
color:white;
display:flex;
flex-direction:column;
}

.sidebar-header{
padding:15px;
background:#111b21;
display:flex;
justify-content:space-between;
align-items:center;
}

.sidebar-header h2{
margin:0;
}

.search{
padding:10px;
background:#111b21;
}

.search input{
width:100%;
padding:8px;
border-radius:5px;
border:none;
}

/* USER LIST */

.users{
flex:1;
overflow-y:auto;
}

.user{
padding:12px;
display:flex;
align-items:center;
cursor:pointer;
border-bottom:1px solid #2a3942;
}

.user:hover{
background:#2a3942;
}

.user img{
width:40px;
height:40px;
border-radius:50%;
margin-right:10px;
}

/* CHAT AREA */

.chat{
width:70%;
display:flex;
flex-direction:column;
background:#efeae2;
}

/* HEADER */

.chat-header{
background:#202c33;
color:white;
padding:10px;
display:flex;
align-items:center;
}

.chat-header img{
width:40px;
height:40px;
border-radius:50%;
margin-right:10px;
}

.chat-info{
display:flex;
flex-direction:column;
}

.typing{
font-size:12px;
color:#25d366;
}

/* MESSAGE AREA */

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

/* INPUT AREA */

.chat-input{
display:flex;
align-items:center;
padding:10px;
background:#202c33;
gap:10px;
}

.chat-input input{
flex:1;
padding:10px;
border-radius:20px;
border:none;
}

.chat-input button{
background:#25d366;
border:none;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

.chat-input button:hover{
background:#1da851;
}

/* LOGOUT */

.logout{
background:#ff4d4d;
border:none;
color:white;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.logout:hover{
background:#e60000;
}

</style>

</head>

<body>

<script>

if(!localStorage.getItem("token")){
window.location="/public/login.html"
}
if(!localStorage.getItem("token")){
window.location="/public/register.html"
}

</script>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="sidebar-header">

<h2>ChatX</h2>

<button class="logout" id="logoutBtn">Logout</button>

</div>

<div class="search">

<input id="searchUser" placeholder="Search user">

</div>

<div id="users" class="users"></div>

</div>

<!-- CHAT AREA -->

<div class="chat">

<div class="chat-header">

<img id="userPic" src="https://media.istockphoto.com/id/636379014/photo/hands-forming-a-heart-shape-with-sunset-silhouette.jpg?s=612x612&w=0&k=20&c=CgjWWGEasjgwia2VT7ufXa10azba2HXmUDe96wZG8F0=">

<div class="chat-info">

<span id="chatWith">Select Chat</span>

<div id="typing" class="typing"></div>

</div>

</div>

<div id="messages" class="messages"></div>

<div class="chat-input">

<button id="emojiBtn">😀</button>

<input id="msg" placeholder="Type message">

<input type="file" id="imageInput" hidden>

<button onclick="document.getElementById('imageInput').click()">📎</button>

<button id="voiceBtn">🎤</button>

<button onclick="sendMessage()">Send</button>

</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="/js/chat.js"></script>

<script>

document.getElementById("logoutBtn").onclick=()=>{

localStorage.removeItem("token")
localStorage.removeItem("user")

window.location="/login.html"

}

</script>

</body>
</html>
