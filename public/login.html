<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<title>ChatX Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#075e54,#25d366);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#25d366;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1da851;
}

.link{
text-align:center;
margin-top:10px;
}

.link a{
color:#075e54;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Login to ChatX</h2>

<form id="loginForm">

<input type="text" id="email" placeholder="Email or Phone" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="link">

Don't have account? <a href="/register.html">Register</a>

</div>

</div>

<script>
    if(localStorage.getItem("token")){

window.location="chat.html"

}

document.getElementById("loginForm").addEventListener("submit",async(e)=>{

e.preventDefault()

const emailOrPhone=document.getElementById("email").value
const password=document.getElementById("password").value

let body={password}

if(emailOrPhone.includes("@")){
body.email=emailOrPhone
}else{
body.phone=emailOrPhone
}

const res = await fetch("/api/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(body)

})

const data=await res.json()

if(data.token){

localStorage.setItem("token",data.token)

localStorage.setItem("user",data.user.username)

window.location="/chat.html"

}else{

alert(data.msg)

}

})

</script>

</body>

</html>
